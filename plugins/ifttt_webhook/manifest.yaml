name: ifttt_webhook
version: "1.0.0"
author: nyaya-official
trust_level: OFFICIAL
description: "IFTTT webhook integration for simple automation and conditional triggers"

abilities:
  ifttt.trigger:
    type: cloud
    endpoint: "https://maker.ifttt.com/trigger/{{event}}/with/key/{{IFTTT_KEY}}"
    method: POST
    params:
      event: { type: string, required: true }
      value1: { type: string, required: false }
      value2: { type: string, required: false }
      value3: { type: string, required: false }
    description: "Trigger IFTTT applet with values"
    receipt_fields: [trigger_success]
