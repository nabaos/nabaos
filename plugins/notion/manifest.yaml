name: notion
version: "1.0.0"
author: nyaya-official
trust_level: OFFICIAL
description: "Notion API integration"

abilities:
  notion.query:
    type: cloud
    endpoint: "https://api.notion.com/v1/databases/{{database_id}}/query"
    method: POST
    headers:
      Authorization: "Bearer {{NOTION_TOKEN}}"
      Notion-Version: "2022-06-28"
      Content-Type: "application/json"
    params:
      database_id: { type: string, required: true }
    description: "Query a Notion database"
    receipt_fields: [result_count]

  notion.create_page:
    type: cloud
    endpoint: "https://api.notion.com/v1/pages"
    method: POST
    headers:
      Authorization: "Bearer {{NOTION_TOKEN}}"
      Notion-Version: "2022-06-28"
      Content-Type: "application/json"
    params:
      parent_id: { type: string, required: true }
      title: { type: string, required: true }
      content: { type: string, required: false }
    description: "Create a Notion page"
    receipt_fields: [page_id]

  notion.search:
    type: cloud
    endpoint: "https://api.notion.com/v1/search"
    method: POST
    headers:
      Authorization: "Bearer {{NOTION_TOKEN}}"
      Notion-Version: "2022-06-28"
      Content-Type: "application/json"
    params:
      query: { type: string, required: true }
    description: "Search across Notion workspace"
    receipt_fields: [result_count]
