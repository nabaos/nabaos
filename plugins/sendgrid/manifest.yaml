name: sendgrid
version: "1.0.0"
author: nyaya-official
trust_level: OFFICIAL
description: "SendGrid transactional and bulk email"

abilities:
  sendgrid.send_transactional:
    type: cloud
    endpoint: "https://api.sendgrid.com/v3/mail/send"
    method: POST
    headers:
      Authorization: "Bearer {{SENDGRID_API_KEY}}"
      Content-Type: "application/json"
    params:
      to: { type: string, required: true }
      subject: { type: string, required: true }
      body: { type: string, required: true }
      template_id: { type: string, required: false }
    description: "Send templated transactional email"
    receipt_fields: [message_id]

  sendgrid.send_bulk:
    type: cloud
    endpoint: "https://api.sendgrid.com/v3/mail/send"
    method: POST
    headers:
      Authorization: "Bearer {{SENDGRID_API_KEY}}"
      Content-Type: "application/json"
    params:
      list_id: { type: string, required: true }
      template_id: { type: string, required: true }
    description: "Send bulk email to a contact list"
    receipt_fields: [recipient_count]

  sendgrid.get_stats:
    type: cloud
    endpoint: "https://api.sendgrid.com/v3/stats"
    method: GET
    headers:
      Authorization: "Bearer {{SENDGRID_API_KEY}}"
    params:
      start_date: { type: string, required: true }
    description: "Get email delivery, open, click, and bounce stats"
    receipt_fields: [delivered, opens, clicks, bounces]
