name: docker_hub
version: "1.0.0"
author: nyaya-official
trust_level: OFFICIAL
description: "Docker Hub API integration for image searching and management"

abilities:
  dockerhub.search_images:
    type: cloud
    endpoint: "https://hub.docker.com/v2/search/repositories"
    method: GET
    params:
      query: { type: string, required: true }
      page_size: { type: int, required: false, default: 25 }
    description: "Search for Docker images on Docker Hub"
    receipt_fields: [image_count]

  dockerhub.get_tags:
    type: cloud
    endpoint: "https://hub.docker.com/v2/repositories/{{namespace}}/{{repository}}/tags"
    method: GET
    params:
      namespace: { type: string, required: true }
      repository: { type: string, required: true }
      page_size: { type: int, required: false, default: 25 }
    description: "Get tags for a Docker image"
    receipt_fields: [tag_count]

  dockerhub.get_image_info:
    type: cloud
    endpoint: "https://hub.docker.com/v2/repositories/{{namespace}}/{{repository}}"
    method: GET
    params:
      namespace: { type: string, required: true }
      repository: { type: string, required: true }
    description: "Get information about a Docker image"
    receipt_fields: [image_name]
