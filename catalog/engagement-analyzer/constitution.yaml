name: engagement-analyzer-constitution
description: Constitution for engagement-analyzer
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within engagement-analyzer designated scope
  trigger_actions:
  - analyze
  trigger_targets:
  - engagement
  - social-metrics
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside engagement-analyzer scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - llm.query
