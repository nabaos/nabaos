id: generate-docs
description: Analyze code and generate documentation
steps:
- id: fetch-code
  ability: github.prs
  params:
    repo: '{{input.repo}}'
    path: '{{input.path}}'
  on_failure: abort
- id: generate
  ability: llm.query
  params:
    prompt: 'Generate comprehensive documentation for this code: {{fetch-code.output}}'
  depends_on:
  - fetch-code
  on_failure: abort
