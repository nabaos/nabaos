name: doc-generator-constitution
description: Constitution for doc-generator
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within doc-generator designated scope
  trigger_actions:
  - generate
  - create
  trigger_targets:
  - docs
  - documentation
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside doc-generator scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: github.prs, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - github.prs
  - llm.query
