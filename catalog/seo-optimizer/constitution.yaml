name: seo-optimizer-constitution
description: Constitution for seo-optimizer
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within seo-optimizer designated scope
  trigger_actions:
  - optimize
  trigger_targets:
  - search
  - ranking
  - seo
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside seo-optimizer scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: search.web, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - search.web
  - llm.query
