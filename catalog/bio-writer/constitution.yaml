name: bio-writer-constitution
description: Constitution for bio-writer
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within bio-writer designated scope
  trigger_actions:
  - create
  - write
  trigger_targets:
  - bio
  - profile
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside bio-writer scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - llm.query
