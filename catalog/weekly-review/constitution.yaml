name: weekly-review-constitution
description: Constitution for weekly-review
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within weekly-review designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - weekly-review
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside weekly-review scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: calendar.list, gmail.read, notion.query,
    llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - calendar.list
  - gmail.read
  - notion.query
  - llm.query
