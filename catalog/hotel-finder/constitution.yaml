name: hotel-finder-constitution
description: Constitution for hotel-finder
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within hotel-finder designated scope
  trigger_actions:
  - find
  - search
  trigger_targets:
  - hotel
  - accommodation
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside hotel-finder scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: search.web, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - search.web
  - llm.query
