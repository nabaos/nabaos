id: plan-groceries
description: Create a grocery shopping list
steps:
- id: plan
  ability: llm.query
  params:
    prompt: 'Create a grocery shopping list for: {{input.meals}}. Servings: {{input.servings}}.
      Dietary preferences: {{input.dietary}}'
  on_failure: abort
- id: store-list
  ability: notion.create_page
  params:
    database: grocery-lists
    title: Groceries - {{input.date}}
    content: '{{plan.output}}'
  depends_on:
  - plan
  on_failure: abort
