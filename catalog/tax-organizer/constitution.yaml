name: tax-organizer-constitution
description: Constitution for tax-organizer
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within tax-organizer designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - tax-organizer
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside tax-organizer scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: gmail.search, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - gmail.search
  - llm.query
