name: runbook-creator-constitution
description: Constitution for runbook-creator
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within runbook-creator designated scope
  trigger_actions:
  - create
  trigger_targets:
  - runbook
  - playbook
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside runbook-creator scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - llm.query
