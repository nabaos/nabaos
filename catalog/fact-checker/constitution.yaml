name: fact-checker-constitution
description: Constitution for fact-checker
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within fact-checker designated scope
  trigger_actions:
  - check
  - fact-check
  - verify
  trigger_targets:
  - statement
  - fact
  - claim
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside fact-checker scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: search.web, news.search, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - search.web
  - news.search
  - llm.query
