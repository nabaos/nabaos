name: content-repurposer-constitution
description: Constitution for content-repurposer
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within content-repurposer designated scope
  trigger_actions:
  - adapt
  - repurpose
  - convert
  trigger_targets:
  - post
  - content
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside content-repurposer scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - llm.query
