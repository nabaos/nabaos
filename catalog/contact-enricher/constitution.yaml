name: contact-enricher-constitution
description: Constitution for contact-enricher
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within contact-enricher designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - contact-enricher
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside contact-enricher scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: gmail.read, notion.create_page, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - gmail.read
  - notion.create_page
  - llm.query
