name: regulation-monitor-constitution
description: Constitution for regulation-monitor
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within regulation-monitor designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - regulation-monitor
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside regulation-monitor scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: search.web, news.search, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - search.web
  - news.search
  - llm.query
