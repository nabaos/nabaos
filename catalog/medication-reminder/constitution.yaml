name: medication-reminder-constitution
description: Constitution for medication-reminder
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within medication-reminder designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - medication-reminder
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside medication-reminder scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: calendar.create, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - calendar.create
  - llm.query
