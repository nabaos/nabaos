name: self-healer-constitution
description: Constitution for self-healer
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within self-healer designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - self-healer
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside self-healer scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - llm.query
