name: email-scheduler-constitution
description: Constitution for email-scheduler
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within email-scheduler designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - email-scheduler
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside email-scheduler scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: gmail.send, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - gmail.send
  - llm.query
