name: backup-manager-constitution
description: Constitution for backup-manager
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within backup-manager designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - backup-manager
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside backup-manager scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - llm.query
