name: quick-capture-constitution
description: Constitution for quick-capture
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within quick-capture designated scope
  trigger_actions:
  - note
  - save
  - capture
  trigger_targets:
  - note
  - idea
  - thought
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside quick-capture scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: notion.create_page, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - notion.create_page
  - llm.query
