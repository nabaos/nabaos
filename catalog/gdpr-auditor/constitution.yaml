name: gdpr-auditor-constitution
description: Constitution for gdpr-auditor
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within gdpr-auditor designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - gdpr-auditor
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside gdpr-auditor scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: search.web, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - search.web
  - llm.query
