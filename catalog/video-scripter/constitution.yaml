name: video-scripter-constitution
description: Constitution for video-scripter
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within video-scripter designated scope
  trigger_actions:
  - create
  - write
  trigger_targets:
  - script
  - youtube
  - video
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside video-scripter scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - llm.query
