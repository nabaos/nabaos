name: ticket-triage-constitution
description: Constitution for ticket-triage
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within ticket-triage designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - ticket-triage
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside ticket-triage scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: gmail.read, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - gmail.read
  - llm.query
