name: press-release-writer-constitution
description: Constitution for press-release-writer
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within press-release-writer designated scope
  trigger_actions:
  - draft
  - write
  trigger_targets:
  - press-release
  - announcement
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside press-release-writer scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - llm.query
