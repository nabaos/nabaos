name: package-tracker-constitution
description: Constitution for package-tracker
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within package-tracker designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - package-tracker
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside package-tracker scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: gmail.search, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - gmail.search
  - llm.query
