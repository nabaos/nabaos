name: onboarding-guide-constitution
description: Constitution for onboarding-guide
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within onboarding-guide designated scope
  trigger_actions:
  - setup
  - onboard
  trigger_targets:
  - new-hire
  - employee
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside onboarding-guide scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: notion.query, gmail.send, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - notion.query
  - gmail.send
  - llm.query
