name: ci-monitor-constitution
description: Constitution for ci-monitor
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within ci-monitor designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - ci-monitor
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside ci-monitor scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: github.prs, github.notifications, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - github.prs
  - github.notifications
  - llm.query
