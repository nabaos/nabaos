name: web-researcher-constitution
description: Constitution for web-researcher
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within web-researcher designated scope
  trigger_actions:
  - research
  - investigate
  trigger_targets:
  - topic
  - subject
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside web-researcher scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: search.web, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - search.web
  - llm.query
