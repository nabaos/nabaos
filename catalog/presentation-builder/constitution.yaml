name: presentation-builder-constitution
description: Constitution for presentation-builder
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within presentation-builder designated scope
  trigger_actions:
  - build
  - create
  trigger_targets:
  - deck
  - presentation
  - slides
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside presentation-builder scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: search.web, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - search.web
  - llm.query
