name: trend-analyzer-constitution
description: Constitution for trend-analyzer
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within trend-analyzer designated scope
  trigger_actions:
  - analyze
  trigger_targets:
  - trend
  - pattern
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside trend-analyzer scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: search.web, news.search, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - search.web
  - news.search
  - llm.query
