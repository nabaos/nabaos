name: security-monitor-constitution
description: Constitution for security-monitor
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within security-monitor designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - security-monitor
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside security-monitor scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - llm.query
