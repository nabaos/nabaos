name: deal-finder-constitution
description: Constitution for deal-finder
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within deal-finder designated scope
  trigger_actions:
  - find
  trigger_targets:
  - discount
  - deal
  - coupon
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside deal-finder scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: search.web, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - search.web
  - llm.query
