name: energy-monitor-constitution
description: Constitution for energy-monitor
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within energy-monitor designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - energy-monitor
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside energy-monitor scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - llm.query
