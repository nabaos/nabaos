name: policy-monitor-constitution
description: Constitution for policy-monitor
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within policy-monitor designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - policy-monitor
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside policy-monitor scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: news.search, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - news.search
  - llm.query
