name: competitor-alert-constitution
description: Constitution for competitor-alert
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within competitor-alert designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - competitor-alert
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside competitor-alert scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: news.search, search.web, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - news.search
  - search.web
  - llm.query
