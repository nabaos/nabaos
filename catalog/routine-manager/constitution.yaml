name: routine-manager-constitution
description: Constitution for routine-manager
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within routine-manager designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - routine-manager
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside routine-manager scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: calendar.list, weather.current, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - calendar.list
  - weather.current
  - llm.query
