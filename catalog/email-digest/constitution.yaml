name: email-digest-constitution
description: Constitution for email-digest
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within email-digest designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - email-digest
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside email-digest scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: gmail.read, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - gmail.read
  - llm.query
