name: price-tracker-constitution
description: Constitution for price-tracker
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within price-tracker designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - price-tracker
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside price-tracker scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: search.web, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - search.web
  - llm.query
