name: daily-journal-constitution
description: Constitution for daily-journal
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within daily-journal designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - daily-journal
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside daily-journal scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: notion.create_page, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - notion.create_page
  - llm.query
