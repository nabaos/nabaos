name: nda-generator-constitution
description: Constitution for nda-generator
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within nda-generator designated scope
  trigger_actions:
  - generate
  - create
  trigger_targets:
  - agreement
  - nda
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside nda-generator scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - llm.query
