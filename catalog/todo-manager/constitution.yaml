name: todo-manager-constitution
description: Constitution for todo-manager
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within todo-manager designated scope
  trigger_actions:
  - check
  - list
  - add
  trigger_targets:
  - todo
  - task
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside todo-manager scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: notion.query, notion.create_page, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - notion.query
  - notion.create_page
  - llm.query
