name: inbox-triage-constitution
description: Constitution for inbox-triage
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within inbox-triage designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - inbox-triage
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside inbox-triage scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: gmail.read, gmail.labels, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - gmail.read
  - gmail.labels
  - llm.query
