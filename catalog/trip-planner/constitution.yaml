name: trip-planner-constitution
description: Constitution for trip-planner
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within trip-planner designated scope
  trigger_actions:
  - create
  - plan
  trigger_targets:
  - itinerary
  - travel
  - trip
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside trip-planner scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: search.web, weather.forecast, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - search.web
  - weather.forecast
  - llm.query
