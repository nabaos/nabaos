name: product-comparator-constitution
description: Constitution for product-comparator
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within product-comparator designated scope
  trigger_actions:
  - compare
  trigger_targets:
  - tool
  - service
  - product
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside product-comparator scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: search.web, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - search.web
  - llm.query
