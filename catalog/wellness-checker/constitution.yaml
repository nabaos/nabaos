name: wellness-checker-constitution
description: Constitution for wellness-checker
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within wellness-checker designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - wellness-checker
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside wellness-checker scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: notion.create_page, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - notion.create_page
  - llm.query
