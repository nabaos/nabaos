name: market-researcher-constitution
description: Constitution for market-researcher
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within market-researcher designated scope
  trigger_actions:
  - research
  trigger_targets:
  - market
  - industry
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside market-researcher scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: search.web, news.search, finance.stock_quote,
    llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - search.web
  - news.search
  - finance.stock_quote
  - llm.query
