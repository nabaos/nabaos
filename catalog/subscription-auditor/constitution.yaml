name: subscription-auditor-constitution
description: Constitution for subscription-auditor
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within subscription-auditor designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - subscription-auditor
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside subscription-auditor scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: gmail.search, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - gmail.search
  - llm.query
