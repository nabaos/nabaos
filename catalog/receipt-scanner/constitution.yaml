name: receipt-scanner-constitution
description: Constitution for receipt-scanner
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within receipt-scanner designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - receipt-scanner
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside receipt-scanner scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: gmail.search, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - gmail.search
  - llm.query
