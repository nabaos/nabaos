name: content-calendar-constitution
description: Constitution for content-calendar
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within content-calendar designated scope
  trigger_actions:
  - create
  - plan
  trigger_targets:
  - social-plan
  - content-calendar
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside content-calendar scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: notion.create_page, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - notion.create_page
  - llm.query
