name: email-drafts-constitution
description: Constitution for email-drafts
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within email-drafts designated scope
  trigger_actions:
  - draft
  - write
  trigger_targets:
  - reply
  - email
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside email-drafts scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: gmail.read, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - gmail.read
  - llm.query
