id: welcome-new-contact
description: Detect first-time contacts and send welcome reply
steps:
- id: read-email
  ability: gmail.read
  params:
    unread: true
  on_failure: abort
- id: check-new
  ability: llm.query
  params:
    prompt: 'Identify first-time contacts from these emails: {{read-email.output}}'
  depends_on:
  - read-email
  on_failure: abort
- id: send-welcome
  ability: gmail.send
  params:
    to: '{{check-new.output.new_contacts}}'
    subject: Welcome!
    body: '{{check-new.output.welcome_message}}'
  depends_on:
  - check-new
  on_failure: abort
