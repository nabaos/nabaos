name: satisfaction-monitor-constitution
description: Constitution for satisfaction-monitor
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within satisfaction-monitor designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - satisfaction-monitor
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside satisfaction-monitor scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: gmail.search, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - gmail.search
  - llm.query
