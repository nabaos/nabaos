name: social-listener-constitution
description: Constitution for social-listener
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within social-listener designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - social-listener
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside social-listener scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: search.web, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - search.web
  - llm.query
