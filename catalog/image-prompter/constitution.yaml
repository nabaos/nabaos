name: image-prompter-constitution
description: Constitution for image-prompter
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within image-prompter designated scope
  trigger_actions:
  - generate
  - create
  trigger_targets:
  - image
  - prompt
  - art
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside image-prompter scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - llm.query
