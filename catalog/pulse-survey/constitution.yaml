name: pulse-survey-constitution
description: Constitution for pulse-survey
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within pulse-survey designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - pulse-survey
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside pulse-survey scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: slack.send, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - slack.send
  - llm.query
