name: leave-tracker-constitution
description: Constitution for leave-tracker
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within leave-tracker designated scope
  trigger_actions:
  - check
  - track
  trigger_targets:
  - leave
  - vacation
  - pto
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside leave-tracker scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: calendar.list, notion.query, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - calendar.list
  - notion.query
  - llm.query
