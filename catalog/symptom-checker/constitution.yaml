name: symptom-checker-constitution
description: Constitution for symptom-checker
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within symptom-checker designated scope
  trigger_actions:
  - check
  trigger_targets:
  - symptom
  - health
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside symptom-checker scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: search.web, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - search.web
  - llm.query
