name: contract-reviewer-constitution
description: Constitution for contract-reviewer
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within contract-reviewer designated scope
  trigger_actions:
  - review
  trigger_targets:
  - contract
  - agreement
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside contract-reviewer scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - llm.query
