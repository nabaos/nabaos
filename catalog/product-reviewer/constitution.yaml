name: product-reviewer-constitution
description: Constitution for product-reviewer
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within product-reviewer designated scope
  trigger_actions:
  - check
  - review
  trigger_targets:
  - product
  - item
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside product-reviewer scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: search.web, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - search.web
  - llm.query
