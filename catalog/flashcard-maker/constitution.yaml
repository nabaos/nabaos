name: flashcard-maker-constitution
description: Constitution for flashcard-maker
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within flashcard-maker designated scope
  trigger_actions:
  - make
  - create
  trigger_targets:
  - study-card
  - flashcard
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside flashcard-maker scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - llm.query
