name: bill-reminder-constitution
description: Constitution for bill-reminder
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within bill-reminder designated scope
  trigger_actions:
  - execute
  - query
  trigger_targets:
  - bill-reminder
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside bill-reminder scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: gmail.search, calendar.create, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - gmail.search
  - calendar.create
  - llm.query
