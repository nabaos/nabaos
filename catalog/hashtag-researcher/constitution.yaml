name: hashtag-researcher-constitution
description: Constitution for hashtag-researcher
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within hashtag-researcher designated scope
  trigger_actions:
  - research
  - find
  trigger_targets:
  - hashtag
  - trending
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside hashtag-researcher scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: search.web, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - search.web
  - llm.query
