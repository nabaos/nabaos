id: analyze-spam
description: Analyze suspicious email for spam/phishing indicators
steps:
- id: read-email
  ability: gmail.read
  params:
    message_id: '{{input.message_id}}'
  on_failure: abort
- id: analyze
  ability: llm.query
  params:
    prompt: 'Analyze this email for spam/phishing indicators (sender reputation, URL
      analysis, language patterns, urgency tactics): {{read-email.output}}'
  depends_on:
  - read-email
  on_failure: abort
