name: financial-reporter-constitution
description: Constitution for financial-reporter
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within financial-reporter designated scope
  trigger_actions:
  - summarize
  - report
  trigger_targets:
  - finances
  - portfolio
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside financial-reporter scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: finance.stock_quote, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - finance.stock_quote
  - llm.query
