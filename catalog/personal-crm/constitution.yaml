name: personal-crm-constitution
description: Constitution for personal-crm
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within personal-crm designated scope
  trigger_actions:
  - check
  - track
  trigger_targets:
  - contact
  - relationship
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside personal-crm scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: gmail.search, calendar.list, notion.create_page,
    llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - gmail.search
  - calendar.list
  - notion.create_page
  - llm.query
