name: flight-tracker-constitution
description: Constitution for flight-tracker
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within flight-tracker designated scope
  trigger_actions:
  - check
  - track
  trigger_targets:
  - flight
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside flight-tracker scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: search.web, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - search.web
  - llm.query
