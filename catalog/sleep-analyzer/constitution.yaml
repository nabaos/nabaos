name: sleep-analyzer-constitution
description: Constitution for sleep-analyzer
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within sleep-analyzer designated scope
  trigger_actions:
  - analyze
  trigger_targets:
  - sleep
  - rest
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside sleep-analyzer scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - llm.query
