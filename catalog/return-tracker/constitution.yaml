name: return-tracker-constitution
description: Constitution for return-tracker
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within return-tracker designated scope
  trigger_actions:
  - check
  - track
  trigger_targets:
  - refund
  - return
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside return-tracker scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: gmail.search, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - gmail.search
  - llm.query
