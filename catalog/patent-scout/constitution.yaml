name: patent-scout-constitution
description: Constitution for patent-scout
rules:
- name: scope
  enforcement: hard_block
  description: Only operate within patent-scout designated scope
  trigger_actions:
  - search
  - find
  trigger_targets:
  - invention
  - patent
- name: no-unauthorized-access
  enforcement: hard_block
  description: Never access data outside patent-scout scope
  trigger_keywords:
  - unauthorized
  - private
  - secret
- name: permission-boundary
  enforcement: hard_block
  description: 'Only use granted permissions: search.web, llm.query'
  trigger_actions:
  - use_permission
  trigger_targets:
  - search.web
  - llm.query
